<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store | Toyota GR Argentina</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Roboto', sans-serif; }
        .navbar { border-bottom: 3px solid #eb0a1e; }
        .store-title { font-family: 'Oswald', sans-serif; font-size: 3rem; text-align: center; margin: 40px 0; }

        /* TARJETA CORREGIDA PARA TUS IMÁGENES */
        .gr-card {
            background-color: #fff; /* Fondo blanco para que coincida con tus fotos */
            border: 2px solid #eb0a1e; /* Borde rojo para el toque 3D */
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: 0.3s;
            height: 100%;
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.1);
        }

        .gr-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(235, 10, 30, 0.4);
        }

        .gr-card img {
            width: 100%;
            height: 280px;
            object-fit: contain;
            margin-bottom: 15px;
        }

        /* Texto en negro porque el fondo ahora es blanco */
        .product-name { 
            font-family: 'Oswald', sans-serif; 
            font-size: 1.3rem; 
            color: #000; 
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .price { 
            color: #eb0a1e; 
            font-size: 1.7rem; 
            font-weight: 900; 
            margin-bottom: 15px; 
        }

        .btn-buy { 
            background: #000; 
            color: #fff; 
            border: none; 
            padding: 10px; 
            font-weight: bold; 
            width: 100%; 
            transition: 0.3s;
        }

        .btn-buy:hover { background: #eb0a1e; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-black py-3">
        <div class="container">
            <a class="navbar-brand" href="../index.html"><img src="../assets/LOGO-GR-PAGE.png" width="150"></a>
            <div class="collapse navbar-collapse justify-content-end">
                <ul class="navbar-nav gap-3">
                    <li class="nav-item"><a class="nav-link text-white" href="../index.html">INICIO</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="quienessomos.html">NOSOTROS</a></li>
                    <li class="nav-item"><a class="nav-link active text-danger" href="store.html">STORE</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="contacto.html">CONTACTO</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <h1 class="store-title">GR MERCHANDISING</h1>
        <div class="row g-4">
            <div class="col-md-4">
                <div class="gr-card">
                    <img src="../assets/buzo gr.png" alt="Buzo GR">
                    <div class="product-name">Buzo Hoodie GR</div>
                    <div class="price">$45.000</div>
                    <button class="btn-buy">COMPRAR</button>
                </div>
            </div>
            <div class="col-md-4">
                <div class="gr-card">
                    <img src="../assets/remera gr.jpg" alt="Remera GR">
                    <div class="product-name">Remera Gazoo Racing</div>
                    <div class="price">$22.500</div>
                    <button class="btn-buy">COMPRAR</button>
                </div>
            </div>
            <div class="col-md-4">
                <div class="gr-card">
                    <img src="../assets/chomba.jpg" alt="Chomba GR">
                    <div class="product-name">Chomba Oficial</div>
                    <div class="price">$28.000</div>
                    <button class="btn-buy">COMPRAR</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
