<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Toyota GR Argentina</title>
    
    <meta name="description" content="Contactate con el equipo de Toyota Gazoo Racing Argentina. Consultas sobre modelos, store y eventos motorsport.">
    <meta name="keywords" content="Toyota, GR, Contacto, Argentina, Gazoo Racing, Consultas">

    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto:wght@300;400;900&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">

    <style>
        /* Aplicar tipografías de forma específica para asegurar consistencia */
        body { font-family: 'Roboto', sans-serif ; }
        h1, .nav-link, .btn { font-family: 'Oswald', sans-serif ; text-transform: uppercase; }
        
        /* Efecto de foco en el formulario con rojo GR */
        .form-control:focus {
            border-color: #eb0a1e;
            box-shadow: 0 0 0 0.25rem rgba(235, 10, 30, 0.25);
            background-color: #000;
            color: white;
        }
    </style>
</head>
<body class="bg-black text-white">

    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-danger py-3">
            <div class="container">
                <a class="navbar-brand" href="../index.html">
                    <img src="../assets/LOGO-GR-PAGE.png" alt="Logo Toyota Gazoo Racing" width="180">
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navNav">
                    <ul class="navbar-nav ms-auto text-center">
                        <li class="nav-item"><a class="nav-link" href="../index.html">Inicio</a></li>
                        <li class="nav-item"><a class="nav-link" href="quienessomos.html">Nosotros</a></li>
                        <li class="nav-item"><a class="nav-link" href="store.html">Store</a></li>
                        <li class="nav-item"><a class="nav-link active text-danger" href="contacto.html">Contacto</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h1 class="fw-bold border-start border-danger border-5 ps-3 mb-4">Contacto</h1>
                <p class="mb-4 text-secondary">Dejanos tu mensaje y nos pondremos en contacto a la brevedad para asesorarte.</p>
                
                <form class="p-4 border border-secondary rounded bg-dark shadow-lg">
                    <div class="mb-3">
                        <label for="nombre" class="form-label">Nombre Completo</label>
                        <input type="text" id="nombre" class="form-control bg-black text-white border-secondary" placeholder="Ej: Juan Pérez" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Correo Electrónico</label>
                        <input type="email" id="email" class="form-control bg-black text-white border-secondary" placeholder="nombre@ejemplo.com" required>
                    </div>
                    <div class="mb-3">
                        <label for="mensaje" class="form-label">Mensaje</label>
                        <textarea id="mensaje" class="form-control bg-black text-white border-secondary" rows="4" placeholder="Escribí tu consulta aquí..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-danger w-100 fw-bold py-2">ENVIAR CONSULTA</button>
                </form>
            </div>
        </div>
    </main>

    <footer class="bg-black border-top border-danger py-4 mt-5">
        <div class="container text-center">
            <p class="mb-0 text-secondary opacity-75">© 2026 Toyota Gazoo Racing Argentina. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
